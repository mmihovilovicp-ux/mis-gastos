<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
  <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#60A5FA"/>
    <stop offset="100%" stop-color="#3B82F6"/>
  </linearGradient>
  <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3B82F6"/>
    <stop offset="100%" stop-color="#1D4ED8"/>
  </linearGradient>
  <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#93C5FD"/>
    <stop offset="100%" stop-color="#fff"/>
  </linearGradient>
</defs>

<!-- Fondo oscuro -->
<rect width="512" height="512" rx="96" fill="#0B1628"/>

<!-- Barras gráfico -->
<rect x="108" y="318" width="58" height="88" rx="12" fill="url(#bar1)" opacity="0.55"/>
<rect x="182" y="268" width="58" height="138" rx="12" fill="url(#bar2)" opacity="0.75"/>
<rect x="256" y="208" width="58" height="198" rx="12" fill="url(#bar3)"/>

<!-- Punto en barra alta -->
<circle cx="285" cy="196" r="12" fill="#fff"/>

<!-- Línea de tendencia punteada -->
<polyline points="137,314 211,264 285,200" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,5" opacity="0.2"/>

<!-- Línea base -->
<line x1="88" y1="406" x2="424" y2="406" stroke="#fff" stroke-width="1.5" opacity="0.12"/>

<!-- $ grande -->
<text x="380" y="390" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="180" font-weight="100" fill="#fff" text-anchor="middle" opacity="0.95">$</text>
</svg>
